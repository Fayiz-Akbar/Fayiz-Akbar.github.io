<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Navy Blue murni ke Slate Gelap -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#183758" />
      <stop offset="100%" stop-color="#0a1424" />
    </linearGradient>
    
    <!-- Gradasi Neon Cyan untuk Titik Branding -->
    <linearGradient id="neon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    
    <!-- Efek Pendaran Glow Lampu Digital (Tech/AI Vibe) -->
    <filter id="glow-effect" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feComponentTransfer in="blur" result="brightBlur">
        <feFuncA type="linear" slope="0.7"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="brightBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Latar Belakang Kotak Membulat Premium (Squircle) -->
  <rect width="512" height="512" rx="140" fill="url(#bg-gradient)" />

  <!-- Ornamen Garis Matriks / Kode Transparan di Pojok Grid -->
  <path d="M60 70h40M60 90h25" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.08"/>
  <circle cx="440" cy="430" r="30" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.05" />

  <!-- Huruf 'F' Geometris Bold (Presisi di Tengah, Tanpa Load Font Eksternal) -->
  <path d="M 160 130 H 360 V 195 H 230 V 255 H 320 V 315 H 230 V 382 H 160 Z" fill="#ffffff" />

  <!-- Titik Aksentuasi Khas "Fayiz." dengan Efek Neon Glow -->
  <circle cx="385" cy="360" r="26" fill="url(#neon-gradient)" filter="url(#glow-effect)" />
</svg>
